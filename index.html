<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TCAP IA² — Inteligência Artificial Jurídica</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0A0E1A;
  color: #E8E0D0;
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.container {
  padding: 2rem;
  max-width: 500px;
}
.logo {
  width: 120px;
  height: 120px;
  object-fit: contain;
  filter: drop-shadow(0 0 30px rgba(139,63,200,0.6));
  margin-bottom: 1.5rem;
}
.titulo {
  font-family: 'Playfair Display', serif;
  font-size: 2.5rem;
  font-weight: 900;
  color: #FFFFFF;
  letter-spacing: 3px;
}
.subtitulo {
  font-size: 0.75rem;
  color: #C9A84C;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin: 0.5rem 0 2rem;
}
.mensagem {
  font-size: 0.9rem;
  color: #8899BB;
  margin-bottom: 2rem;
}
.btn {
  display: inline-block;
  background: linear-gradient(135deg, #1A1A2E, #0F3460);
  color: #F0EAD6;
  border: 1px solid #C9A84C;
  border-radius: 10px;
  padding: 1rem 2.5rem;
  font-size: 1rem;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.3s;
}
.btn:hover {
  background: linear-gradient(135deg, #C9A84C, #B8960A);
  color: #1A1A2E;
}
.rodape {
  margin-top: 3rem;
  font-size: 0.7rem;
  color: #334;
}
</style>
</head>
<body>
<div class="container">
  <img class="logo" src="https://i.imgur.com/placeholder.png"
       onerror="this.style.display='none'"
       alt="TCAP IA²">
  <div style="font-size:4rem;margin-bottom:1rem;filter:drop-shadow(0 0 20px #8B3FC8)">⚛️</div>
  <div class="titulo">TCAP IA²</div>
  <div class="subtitulo">Inteligência Artificial Jurídica</div>
  <div class="mensagem">Clique no botão abaixo para acessar o sistema</div>
  <a class="btn" href="https://tcap-painel.streamlit.app">🔐 Acessar Agora</a>
  <div class="rodape">
    TCAP Engenharias e Tecnologia Ltda · CNPJ 55.936.167/0001-50<br>
    Barra do Garças — MT — Brasil · © 2026
  </div>
</div>
</body>
</html>
